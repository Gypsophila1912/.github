version: 2

updates:
  # GitHub Actions 自体のバージョンを自動更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies

  # npm を使う場合（不要なら削除）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    # マイナー・パッチのみ自動マージ対象にする場合は設定を追加
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # pip を使う場合（不要なら削除）
  # - package-ecosystem: pip
  #   directory: /
  #   schedule:
  #     interval: weekly
  #   commit-message:
  #     prefix: "chore(deps)"
  #   labels:
  #     - dependencies
