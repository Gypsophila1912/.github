name: 🚀 機能リクエスト
description: 新機能や改善の提案
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        アイデアをシェアしてください！

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな問題・不便さを解消したいか
      placeholder: 例）〜するとき毎回手動で対応が必要で面倒
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どんな機能・変更を想定しているか
      placeholder: 例）〜コマンド一発で自動化できるようにしたい
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に考えたアプローチがあれば
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度感
      options:
        - 低（あると嬉しい）
        - 中（業務に影響がある）
        - 高（ブロッカーになっている）
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 確認事項
      options:
        - label: 既存のイシューを検索して重複がないか確認した
          required: true
